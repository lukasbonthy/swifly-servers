services:
  - type: web
    name: swifly-server-registry
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEARTBEAT_TTL_SECONDS
        value: "180"
      - key: APP_SECRET
        generateValue: true
